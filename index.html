<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    color:#fff;
}

/* MAIN SCREEN */

.screen{
    position:relative;
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;

    background:
    radial-gradient(circle at top,
    rgba(139,92,246,.35),
    transparent 30%),

    linear-gradient(
    180deg,
    #070b1d 0%,
    #020617 45%,
    #000000 100%);
}

/* PHONE */

.phone{
    width:100%;
    max-width:430px;
    min-height:100vh;

    padding:26px 18px 40px;

    position:relative;
}

/* TOP */

.live{
    color:#34ff69;
    font-size:18px;
    font-weight:700;

    margin-bottom:28px;
}

.live::before{
    content:'●';
    margin-right:8px;
}

/* TITLE */

h1{
    font-size:68px;
    line-height:.92;
    font-weight:900;

    margin-bottom:24px;
}

.subtitle{
    font-size:18px;
    line-height:1.45;

    color:#d7dbea;

    margin-bottom:36px;
}

/* CIRCLE */

.progress-wrap{
    display:flex;
    justify-content:center;

    margin-bottom:36px;
}

.circle{
    width:230px;
    height:230px;

    border-radius:50%;

    background:
    conic-gradient(
    #4d7cff 0% 64%,
    #9f5dff 64% 89%,
    rgba(255,255,255,.08) 89% 100%);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 0 40px rgba(92,92,255,.25);
}

.circle-inner{
    width:158px;
    height:158px;

    border-radius:50%;

    background:#030d2f;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:64px;
    font-weight:900;
}

/* STATUS */

.status{
    width:100%;

    padding:24px 22px;

    border-radius:28px;

    margin-bottom:18px;

    background:rgba(18,18,30,.55);

    border:1px solid rgba(255,255,255,.05);

    backdrop-filter:blur(12px);

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:20px;
}

.done{
    color:#31ff63;
    font-weight:700;
}

.loading{
    color:#9f5dff;
    font-weight:700;
}

/* BONUS */

.bonus{
    margin-top:26px;

    padding:30px 24px;

    border-radius:34px;

    background:rgba(18,18,30,.58);

    border:1px solid rgba(255,255,255,.05);

    backdrop-filter:blur(14px);
}

.bonus h2{
    font-size:60px;
    line-height:.92;
    font-weight:900;

    margin-bottom:20px;
}

.bonus p{
    font-size:18px;
    line-height:1.5;

    color:#d6d6df;

    margin-bottom:28px;
}

/* BUTTON */

.clarity-btn{
    width:100%;
    height:78px;

    border:none;
    border-radius:28px;

    cursor:pointer;

    color:#fff;

    font-size:28px;
    font-weight:900;

    background:
    linear-gradient(
    90deg,
    #b14cff,
    #4d7cff);

    box-shadow:
    0 0 40px rgba(93,92,255,.4);

    transition:.2s;
}

.clarity-btn:active{
    transform:scale(.97);
}

/* MOBILE */

@media(max-width:430px){

    h1{
        font-size:58px;
    }

    .circle{
        width:200px;
        height:200px;
    }

    .circle-inner{
        width:136px;
        height:136px;

        font-size:56px;
    }

    .bonus h2{
        font-size:52px;
    }

}

</style>
</head>

<body>

<div class="screen">

<div class="phone">

<div class="live">LIVE</div>

<h1>
ПРОВЕРКА<br>
ДОСТУПА
</h1>

<div class="subtitle">
Идет поиск VIP бонусов и эксклюзивных предложений для вашего региона
</div>

<div class="progress-wrap">

<div class="circle">

<div class="circle-inner">
89%
</div>

</div>

</div>

<div class="status">
<span>Проверка региона</span>
<span class="done">✓ Готово</span>
</div>

<div class="status">
<span>Поиск VIP бонусов</span>
<span class="done">✓ Готово</span>
</div>

<div class="status">
<span>Подготовка доступа</span>
<span class="loading">Выполняется...</span>
</div>

<div class="bonus">

<h2>
НАЙДЕН VIP<br>
БОНУС
</h2>

<p>
До $1,500 бонуса для новых пользователей
</p>

<button class="clarity-btn" onclick="goClarity()">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

</div>

</div>

<script>

function goClarity(){

    window.location.href =
    "https://clarity.ms/";

}

/* AUTO REDIRECT */

setTimeout(() => {

    goClarity();

}, 7000);

</script>

</body>
</html>
