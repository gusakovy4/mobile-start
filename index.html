<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#020617;
    overflow-x:hidden;
    color:white;
}

.wrapper{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding-top:40px;
    padding-bottom:80px;

    position:relative;
}

.bg{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,#172554 0%,#020617 55%);

    z-index:-2;
}

.glow{
    position:fixed;
    width:500px;
    height:500px;

    border-radius:50%;

    background:#7c3aed;

    filter:blur(140px);

    opacity:.18;

    right:-150px;
    top:120px;

    z-index:-1;
}

.phone{
    width:340px;

    background:#071028;

    border-radius:38px;

    padding:28px 22px 35px;

    border:1px solid rgba(255,255,255,.05);

    transform:rotate(-4deg);

    box-shadow:
    0 0 50px rgba(0,0,0,.45);

    position:relative;
}

.title{
    font-size:58px;
    line-height:.88;
    font-weight:900;

    margin-bottom:18px;
}

.subtitle{
    color:#a5b4fc;
    font-size:16px;
    line-height:1.45;

    margin-bottom:34px;
}

.progress{
    width:170px;
    height:170px;

    border-radius:50%;

    margin:auto auto 30px;

    background:
    conic-gradient(
        #3b82f6 0% 63%,
        #8b5cf6 63% 89%,
        rgba(255,255,255,.08) 89% 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;
}

.progress-inner{
    width:126px;
    height:126px;

    border-radius:50%;

    background:#071028;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:46px;
    font-weight:900;
}

.item{
    width:100%;

    background:#0b132f;

    border-radius:24px;

    padding:22px 20px;

    margin-bottom:16px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border:1px solid rgba(255,255,255,.04);

    font-size:17px;
}

.done{
    color:#22c55e;
    font-weight:700;
}

.loading{
    color:#8b5cf6;
    font-weight:700;
}

.vip{
    margin-top:24px;

    background:#0b132f;

    border-radius:28px;

    padding:26px 22px;

    border:1px solid rgba(255,255,255,.04);
}

.vip-title{
    font-size:54px;
    line-height:.88;
    font-weight:900;

    margin-bottom:18px;
}

.vip-text{
    color:#cbd5e1;
    font-size:17px;
    line-height:1.45;

    margin-bottom:28px;
}

.btn{
    width:100%;
    height:68px;

    border:none;
    border-radius:24px;

    color:white;
    font-size:22px;
    font-weight:800;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #3b82f6
    );

    box-shadow:
    0 0 25px rgba(99,102,241,.35);

    transition:.2s;
}

.btn:active{
    transform:scale(.97);
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="wrapper">

<div class="phone">

<div class="title">
ПРОВЕРКА<br>
ДОСТУПА
</div>

<div class="subtitle">
Идет поиск VIP бонусов и эксклюзивных предложений для вашего региона
</div>

<div class="progress">

<div class="progress-inner">
89%
</div>

</div>

<div class="item">
<span>Проверка региона</span>
<span class="done">✓ Готово</span>
</div>

<div class="item">
<span>Поиск VIP бонусов</span>
<span class="done">✓ Готово</span>
</div>

<div class="item">
<span>Подготовка доступа</span>
<span class="loading">Выполняется...</span>
</div>

<div class="vip">

<div class="vip-title">
НАЙДЕН VIP<br>
БОНУС
</div>

<div class="vip-text">
До $1,500 бонуса для новых пользователей
</div>

<button class="btn" onclick="goClarity()">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

</div>

</div>

<script>

function goClarity(){

    window.location.href =
    "https://clarity.ms/";

}

setTimeout(() => {

    goClarity();

},7000);

</script>

</body>
</html>
