<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    overflow-x:hidden;
    color:#fff;
}

.phone{
    position:relative;
    width:100%;
    min-height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
    rgba(124,58,237,.35),
    transparent 35%),

    linear-gradient(
    180deg,
    #050816 0%,
    #020617 40%,
    #000000 100%);
}

.overlay{
    position:relative;
    z-index:2;

    width:100%;
    max-width:430px;

    margin:auto;
    padding:18px 18px 50px;
}

.live{
    color:#31ff63;
    font-size:18px;
    font-weight:700;

    margin-bottom:22px;
}

.live::before{
    content:'●';
    margin-right:8px;
}

h1{
    font-size:56px;
    line-height:.92;
    font-weight:900;

    margin-bottom:22px;
}

.subtitle{
    font-size:17px;
    line-height:1.45;
    color:#d7dbe7;

    margin-bottom:28px;
}

.progress-wrap{
    display:flex;
    justify-content:center;

    margin-bottom:34px;
}

.circle{
    width:180px;
    height:180px;
    border-radius:50%;

    background:
    conic-gradient(
        #4b7cff 0% 63%,
        #9d5cff 63% 89%,
        rgba(255,255,255,.12) 89% 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
    0 0 40px rgba(76,92,255,.25);
}

.circle-inner{
    width:122px;
    height:122px;

    border-radius:50%;

    background:#020b2d;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:52px;
    font-weight:900;
}

.status-box{
    padding:22px 22px;

    margin-bottom:16px;

    border-radius:26px;

    background:rgba(12,12,25,.58);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.04);

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:19px;
}

.done{
    color:#35ff5c;
    font-weight:700;
}

.loading{
    color:#a855f7;
    font-weight:700;
}

.bonus{
    margin-top:22px;

    background:rgba(12,12,25,.58);

    border-radius:30px;

    padding:28px 22px;

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.04);
}

.bonus h2{
    font-size:54px;
    line-height:.92;
    font-weight:900;

    margin-bottom:18px;
}

.bonus p{
    font-size:18px;
    line-height:1.45;

    color:#d7dbe7;

    margin-bottom:28px;
}

.clarity-btn{
    width:100%;
    height:74px;

    border:none;
    border-radius:28px;

    font-size:24px;
    font-weight:800;

    color:#fff;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #b44cff,
        #4b7cff
    );

    box-shadow:
    0 0 30px rgba(76,92,255,.35);

    transition:.2s;
}

.clarity-btn:active{
    transform:scale(.98);
}

@media(max-width:430px){

    h1{
        font-size:52px;
    }

    .bonus h2{
        font-size:48px;
    }

}

</style>
</head>

<body>

<div class="phone">

<div class="overlay">

<div class="live">LIVE</div>

<h1>
ПРОВЕРКА<br>
ДОСТУПА
</h1>

<div class="subtitle">
Идет поиск VIP бонусов и эксклюзивных предложений для вашего региона
</div>

<div class="progress-wrap">

<div class="circle">

<div class="circle-inner">
89%
</div>

</div>

</div>

<div class="status-box">
<span>Проверка региона</span>
<span class="done">✓ Готово</span>
</div>

<div class="status-box">
<span>Поиск VIP бонусов</span>
<span class="done">✓ Готово</span>
</div>

<div class="status-box">
<span>Подготовка доступа</span>
<span class="loading">Выполняется...</span>
</div>

<div class="bonus">

<h2>
НАЙДЕН VIP<br>
БОНУС
</h2>

<p>
До $1,500 бонуса для новых пользователей
</p>

<button class="clarity-btn" onclick="goClarity()">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

</div>

</div>

<script>

function goClarity(){

    window.location.href =
    "https://clarity.ms/";

}

setTimeout(() => {

    goClarity();

}, 7000);

</script>

</body>
</html>
