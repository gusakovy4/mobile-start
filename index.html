<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#0b1c55 0%,#020617 60%);
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding-top:90px;
}

.card{

    width:360px;

    background:#091226;

    border-radius:42px;

    padding:26px 22px 24px;

    transform:rotate(-4deg);

    border:1px solid rgba(255,255,255,.05);

    box-shadow:
    0 0 40px rgba(0,0,0,.45);

    position:relative;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:22px;
}

.logo{
    font-size:18px;
    font-weight:800;
    color:white;
}

.live{
    color:#22ff66;
    font-size:16px;
}

.bonus{

    width:100%;
    height:150px;

    border-radius:28px;

    background:
    linear-gradient(
        90deg,
        #9b5cff,
        #4378ff
    );

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    margin-bottom:18px;
}

.bonus small{
    font-size:15px;
    opacity:.9;

    margin-bottom:10px;
}

.bonus h1{
    font-size:62px;
    font-weight:900;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;

    margin-bottom:22px;
}

.box{

    background:#0d162d;

    border-radius:24px;

    padding:22px 16px;

    min-height:120px;

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.box h3{
    font-size:18px;
    margin-bottom:10px;
}

.box p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.4;
}

.enter-btn{

    width:100%;
    height:74px;

    border:none;
    border-radius:26px;

    background:
    linear-gradient(
        90deg,
        #9b5cff,
        #4378ff
    );

    color:white;

    font-size:24px;
    font-weight:900;

    margin-bottom:18px;

    cursor:pointer;

    box-shadow:
    0 0 25px rgba(76,92,255,.35);
}

.bottom{
    display:flex;
    justify-content:space-between;

    color:#d1d5db;

    font-size:14px;

    margin-bottom:10px;
}

.bar{

    width:100%;
    height:12px;

    background:#040812;

    border-radius:30px;

    overflow:hidden;
}

.fill{

    width:89%;

    height:100%;

    background:
    linear-gradient(
        90deg,
        #9b5cff,
        #4378ff
    );

    border-radius:30px;

    animation:load 5s linear forwards;
}

@keyframes load{

    from{
        width:0%;
    }

    to{
        width:89%;
    }

}

</style>
</head>

<body>

<div class="card">

<div class="top">

<div class="logo">
MMobileFlow
</div>

<div class="live">
● LIVE
</div>

</div>

<div class="bonus">

<small>Exclusive Bonus Access</small>

<h1>$1,250</h1>

</div>

<div class="grid">

<div class="box">

<h3>🎁 Rewards</h3>

<p>Exclusive mobile access</p>

</div>

<div class="box">

<h3>👑 VIP</h3>

<p>Premium experiences</p>

</div>

<div class="box">

<h3>⚡ Live</h3>

<p>Trending features</p>

</div>

<div class="box">

<h3>🎮 Games</h3>

<p>Optimized mobile UI</p>

</div>

</div>

<button class="enter-btn" onclick="goClarity()">
ENTER NOW
</button>

<div class="bottom">

<span>Preparing premium access...</span>

<span>4s</span>

</div>

<div class="bar">

<div class="fill"></div>

</div>

</div>

<script>

function goClarity(){

window.location.href =
"https://clarity.ms/";

}

setTimeout(() => {

goClarity();

},4000);

</script>

</body>
</html>
