<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#040816;
    font-family:Arial,sans-serif;
    overflow-x:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    padding:20px;
}

/* PHONE */

.phone-wrapper{
    width:min(92vw,380px);
    aspect-ratio:9/19.5;

    position:relative;
    margin:auto;
}

/* BACKGROUND IMAGE */

.phone-bg{
    width:100%;
    height:auto;
    display:block;

    border-radius:42px;
}

/* CONTENT */

.phone-content{
    position:absolute;
    inset:0;

    padding:24px;

    display:flex;
    flex-direction:column;
    align-items:center;

    color:white;
}

/* TITLE */

.title{
    margin-top:40px;

    text-align:center;

    font-size:42px;
    font-weight:800;
    line-height:1.1;
}

/* SUBTITLE */

.subtitle{
    margin-top:18px;

    text-align:center;

    color:#b4bdd3;

    font-size:18px;
    line-height:1.5;
}

/* PROGRESS */

.progress-wrap{
    margin-top:34px;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    conic-gradient(
        #3b82f6 0deg,
        #8b5cf6 320deg,
        rgba(255,255,255,0.08) 320deg
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.progress-inner{
    width:135px;
    height:135px;

    border-radius:50%;

    background:#071127;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:46px;
    font-weight:800;
}

/* STATUS CARDS */

.status-list{
    width:100%;
    margin-top:28px;

    display:flex;
    flex-direction:column;
    gap:14px;
}

.status-item{
    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:24px;

    padding:18px 20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    backdrop-filter:blur(12px);
}

.status-text{
    font-size:18px;
    color:white;
}

.status-ready{
    color:#2dff72;
    font-weight:700;
}

.status-loading{
    color:#8b5cf6;
    font-weight:700;
}

/* BONUS CARD */

.bonus-card{
    width:100%;

    margin-top:22px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:30px;

    padding:24px;

    backdrop-filter:blur(14px);
}

.bonus-title{
    font-size:42px;
    line-height:1.1;
    font-weight:900;
}

.bonus-sub{
    margin-top:14px;

    color:#b4bdd3;

    font-size:20px;
    line-height:1.4;
}

/* BUTTON */

.claim-btn{
    width:100%;

    margin-top:24px;

    border:none;
    border-radius:24px;

    padding:22px;

    font-size:22px;
    font-weight:800;

    color:white;

    background:linear-gradient(
        90deg,
        #8b5cf6,
        #3b82f6
    );

    cursor:pointer;
}

/* MOBILE */

@media(max-width:480px){

    .phone-wrapper{
        width:95vw;
    }

    .title{
        font-size:34px;
    }

    .subtitle{
        font-size:16px;
    }

    .progress-wrap{
        width:150px;
        height:150px;
    }

    .progress-inner{
        width:112px;
        height:112px;
        font-size:38px;
    }

    .bonus-title{
        font-size:34px;
    }

    .bonus-sub{
        font-size:17px;
    }

    .claim-btn{
        font-size:18px;
        padding:18px;
    }
}

</style>
</head>

<body>

<div class="phone-wrapper">

<img class="phone-bg" src="cat.jpg" alt="bg">

<div class="phone-content">

<div class="title">
ПРОВЕРКА<br>
ДОСТУПА
</div>

<div class="subtitle">
Идет поиск VIP бонусов и эксклюзивных предложений для вашего региона
</div>

<div class="progress-wrap">
    <div class="progress-inner">
        89%
    </div>
</div>

<div class="status-list">

    <div class="status-item">
        <div class="status-text">
            Проверка региона
        </div>

        <div class="status-ready">
            ✓ Готово
        </div>
    </div>

    <div class="status-item">
        <div class="status-text">
            Поиск VIP бонусов
        </div>

        <div class="status-ready">
            ✓ Готово
        </div>
    </div>

    <div class="status-item">
        <div class="status-text">
            Подготовка доступа
        </div>

        <div class="status-loading">
            Выполняется...
        </div>
    </div>

</div>

<div class="bonus-card">

    <div class="bonus-title">
        НАЙДЕН VIP<br>
        БОНУС
    </div>

    <div class="bonus-sub">
        До $1,500 бонуса для новых пользователей
    </div>

    <button class="claim-btn">
        ПОЛУЧИТЬ
    </button>

</div>

</div>
</div>

</body>
</html>
