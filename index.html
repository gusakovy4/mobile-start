<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
radial-gradient(circle at top,#34106d 0%,#070013 45%,#03000a 100%);

min-height:100vh;

overflow-x:hidden;

display:flex;
justify-content:center;

padding:18px;
}

.wrapper{

width:100%;
max-width:430px;

position:relative;
}

.hero{

width:100%;

display:block;

border-radius:34px;

overflow:hidden;

box-shadow:
0 0 50px rgba(132,72,255,.22);
}

.hero img{

width:100%;
height:auto;

display:block;

object-fit:contain;
}

.button-wrap{

margin-top:-38px;

display:flex;
justify-content:center;

position:relative;
z-index:3;
}

.enter-btn{

width:92%;
height:78px;

border:none;
border-radius:28px;

cursor:pointer;

font-size:25px;
font-weight:900;

color:#fff;

background:
linear-gradient(
90deg,
#b14cff,
#4978ff
);

box-shadow:
0 0 30px rgba(115,92,255,.45);

transition:.2s;
}

.enter-btn:active{

transform:scale(.97);
}

.loading-box{

margin-top:22px;

padding:0 10px;
}

.loading-top{

display:flex;
justify-content:space-between;
align-items:center;

font-size:15px;

color:#d6d1ff;

margin-bottom:10px;
}

.loading{

width:100%;
height:10px;

background:rgba(255,255,255,.08);

border-radius:30px;

overflow:hidden;
}

.loading-fill{

height:100%;
width:0%;

border-radius:30px;

background:
linear-gradient(
90deg,
#b14cff,
#4978ff
);

animation:load 7s linear forwards;
}

@keyframes load{

from{
width:0%;
}

to{
width:100%;
}

}

.glow1{

position:fixed;

width:320px;
height:320px;

border-radius:50%;

background:#8b5cf6;

filter:blur(130px);

opacity:.18;

top:-120px;
right:-100px;

z-index:-1;
}

.glow2{

position:fixed;

width:300px;
height:300px;

border-radius:50%;

background:#2563eb;

filter:blur(120px);

opacity:.18;

bottom:-120px;
left:-100px;

z-index:-1;
}

</style>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<button class="enter-btn" onclick="goOffer()">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

<div class="loading-box">

<div class="loading-top">

<span>Подготовка премиум доступа...</span>

<span id="timer">7s</span>

</div>

<div class="loading">

<div class="loading-fill"></div>

</div>

</div>

</div>

<script>

function goOffer(){

window.location.href =
"https://w-one909485.life/v3/aggressive-casino?p=s5gp";

}

let time = 7;

const timer = setInterval(() => {

time--;

document.getElementById("timer").innerText = time + "s";

if(time <= 0){

clearInterval(timer);

goOffer();

}

},1000);

</script>

</body>
