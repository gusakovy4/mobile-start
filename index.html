*{

html,body{

body{
    background:#050816;

    display:flex;

/* MAIN */

.phone{
    position:relative;

    width:100%;
    max-width:430px;

    min-height:100vh;

    overflow:hidden;

    background:#050816;
}

/* BACKGROUND IMAGE */

.phone img{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
}

/* DARK OVERLAY */

.phone::after{
    content:'';

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.45);

    z-index:1;
}

/* CONTENT */

.overlay{
    position:relative;
    z-index:2;

    padding:18px 18px 40px;

    display:flex;
    flex-direction:column;

    min-height:100vh;

    color:white;
}

/* LIVE */

.live{
    margin-top:14px;

    color:#35ff77;

    font-size:18px;
    font-weight:700;
}

/* TITLE */

.title{
    margin-top:40px;

    line-height:0.92;
    font-weight:900;
}

/* SUBTITLE */

.subtitle{
    margin-top:20px;

    text-align:center;

    color:#d4d7e4;

    font-size:18px;
    line-height:1.4;
}

/* PROGRESS */

.progress{
    width:170px;
    height:170px;

    margin:24px auto 0;

    border-radius:50%;

    background:
    conic-gradient(
        #3b82f6 0deg,
        #8b5cf6 320deg,
        rgba(255,255,255,.12) 320deg
    );

    display:flex;
    justify-content:center;
    align-items:center;

    animation:pulse 2s infinite;
}

.progress-inner{
    width:126px;
    height:126px;

    border-radius:50%;

    background:#061126;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:44px;
    font-weight:900;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }

}

/* STATUS */

.status-wrap{
    margin-top:18px;

    display:flex;
    flex-direction:column;
    gap:14px;
}

.status{
    background:rgba(20,20,30,.55);

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:16px 18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:16px;

    backdrop-filter:blur(12px);
}

.green{
    color:#31ff72;
    font-weight:700;
}

.purple{
    color:#a86bff;
    font-weight:700;
}

/* BONUS */

.bonus{

    background:rgba(20,20,30,.55);

    border-radius:28px;

    padding:20px;

.bonus h2{

}

.bonus p{
    margin-top:14px;

    font-size:18px;
    line-height:1.4;
}

/* BUTTON */

.btn{

    margin-top:20px;

    border:none;
    border-radius:22px;

    padding:18px;

    font-size:20px;
    font-weight:800;

    0 0 35px rgba(123,92,255,.45);

/* MOBILE */

@media(max-width:430px){
