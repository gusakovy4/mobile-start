<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#2b1468 0%,#060018 55%,#02000d 100%);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:20px;
    padding-top:40px;
}

.live{
    color:#73ff73;
    font-size:18px;
    font-weight:700;
    margin-bottom:18px;
}

.live::before{
    content:"● ";
}

.title{
    font-size:64px;
    font-weight:900;
    line-height:0.95;
    margin-bottom:24px;
    text-transform:uppercase;
}

.subtitle{
    font-size:19px;
    color:#d7d7d7;
    line-height:1.4;
    margin-bottom:34px;
}

.circle-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:34px;
}

.circle{
    width:250px;
    height:250px;
    border-radius:50%;
    background:
    conic-gradient(
        #5d7cff 0deg,
        #5d7cff 250deg,
        #9b5cff 310deg,
        #1a1d35 360deg
    );
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 35px rgba(93,124,255,.35);
}

.circle-inner{
    width:165px;
    height:165px;
    border-radius:50%;
    background:#040726;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:68px;
    font-weight:900;
}

.step{
    background:rgba(18,18,30,.88);
    border:1px solid rgba(255,255,255,.05);
    border-radius:28px;
    padding:24px 26px;
    margin-bottom:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(12px);
    font-size:21px;
}

.done{
    color:#62ff67;
    font-weight:700;
}

.loading{
    color:#ab6cff;
    font-weight:700;
}

.bonus-card{
    margin-top:18px;
    background:rgba(18,18,30,.92);
    border-radius:30px;
    padding:30px 24px;
    border:1px solid rgba(255,255,255,.05);
}

.bonus-title{
    font-size:58px;
    font-weight:900;
    line-height:0.95;
    margin-bottom:22px;
    text-transform:uppercase;
}

.bonus-text{
    font-size:22px;
    color:#d9d9d9;
    line-height:1.4;
    margin-bottom:30px;
}

.btn{
    width:100%;
    border:none;
    border-radius:28px;
    padding:26px;
    font-size:32px;
    font-weight:900;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#b05cff,#5f7cff);
    box-shadow:0 0 35px rgba(120,90,255,.45);
    transition:.2s;
}

.btn:active{
    transform:scale(.98);
}

.progress-box{
    margin-top:28px;
}

.progress-text{
    display:flex;
    justify-content:space-between;
    font-size:18px;
    color:#d6d6d6;
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:12px;
    border-radius:30px;
    background:#171727;
    overflow:hidden;
}

.progress-fill{
    width:89%;
    height:100%;
    border-radius:30px;
    background:linear-gradient(90deg,#a95cff,#5f7cff);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{opacity:.7;}
    50%{opacity:1;}
    100%{opacity:.7;}
}

@media(max-width:430px){

.title{
    font-size:56px;
}

.circle{
    width:220px;
    height:220px;
}

.circle-inner{
    width:145px;
    height:145px;
    font-size:58px;
}

.bonus-title{
    font-size:48px;
}

.btn{
    font-size:28px;
    padding:22px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="live">LIVE</div>

<div class="title">
VERIFICACIÓN<br>
DE ACCESO
</div>

<div class="subtitle">
Buscando bonos VIP exclusivos<br>
para tu región
</div>

<div class="circle-wrap">
<div class="circle">
<div class="circle-inner">89%</div>
</div>
</div>

<div class="step">
<span>Verificación de región</span>
<span class="done">✓ Listo</span>
</div>

<div class="step">
<span>Búsqueda de bonos VIP</span>
<span class="done">✓ Listo</span>
</div>

<div class="step">
<span>Preparando acceso</span>
<span class="loading">En proceso...</span>
</div>

<div class="bonus-card">

<div class="bonus-title">
BONO VIP<br>
ENCONTRADO
</div>

<div class="bonus-text">
Hasta 5.000.000 CLP<br>
+ 250 giros gratis
</div>

<button class="btn" onclick="goOffer()">
OBTENER ACCESO
</button>

<div class="progress-box">

<div class="progress-text">
<span>Preparando acceso premium...</span>
<span>89%</span>
</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

</div>
</div>
</div>

<script>

    if(window.clarity){
        clarity("set","offer_click","chile_offer");

    setTimeout(function(){
        window.location.href =

</script>

</html>
