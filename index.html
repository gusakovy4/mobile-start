<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>VIP ACCESS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#020617;
    overflow-x:hidden;
    color:#fff;
}

.phone{
    position:relative;
    width:100%;
    min-height:100vh;
    overflow:hidden;
}

.phone img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;

    filter:
    brightness(.35)
    blur(1px);

    transform:scale(1.05);
}

.phone::after{
    content:'';
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.70),
        rgba(0,0,0,.45),
        rgba(0,0,0,.78)
    );

    z-index:1;
}

.overlay{
    position:relative;
    z-index:2;

    width:100%;
    max-width:430px;

    margin:auto;
    padding:24px 18px 40px;
}

.live{
    color:#31ff63;
    font-size:18px;
    font-weight:700;

    margin-bottom:22px;
}

.live::before{
    content:'●';
    margin-right:8px;
}

h1{
    font-size:68px;
    line-height:.9;
    font-weight:900;

    margin-bottom:24px;
}

.subtitle{
    font-size:18px;
    line-height:1.5;
    color:#e2e8f0;

    margin-bottom:35px;
}

.progress-wrap{
    display:flex;
    justify-content:center;

    margin-bottom:35px;
}

.circle{
    width:220px;
    height:220px;
    border-radius:50%;

    background:
    conic-gradient(
        #4b7cff 0% 63%,
        #9d5cff 63% 89%,
        rgba(255,255,255,.12) 89% 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:
    0 0 30px rgba(76,92,255,.25);
}

.circle-inner{
    width:150px;
    height:150px;
    border-radius:50%;

    background:#020b2d;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:64px;
    font-weight:900;
}

.status-box{
    width:100%;

    padding:24px 24px;

    margin-bottom:18px;

    border-radius:28px;

    background:rgba(20,20,30,.58);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.05);

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:20px;
}

.done{
    color:#3cff5f;
    font-weight:700;
}

.loading{
    color:#a855f7;
    font-weight:700;
}

.bonus{
    margin-top:26px;

    background:rgba(20,20,30,.58);

    border-radius:34px;

    padding:30px 24px;

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.05);
}

.bonus h2{
    font-size:58px;
    line-height:.92;
    font-weight:900;

    margin-bottom:18px;
}

.bonus p{
    font-size:18px;
    line-height:1.5;

    color:#d1d5db;

    margin-bottom:28px;
}

.clarity-btn{
    width:100%;
    height:74px;

    border:none;
    border-radius:28px;

    font-size:26px;
    font-weight:800;

    color:#fff;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #9d5cff,
        #4b7cff
    );

    box-shadow:
    0 0 30px rgba(76,92,255,.35);

    transition:.2s;
}

.clarity-btn:active{
    transform:scale(.97);
}

@media(max-width:430px){

    h1{
        font-size:58px;
    }

    .circle{
        width:190px;
        height:190px;
    }

    .circle-inner{
        width:128px;
        height:128px;

        font-size:54px;
    }

    .bonus h2{
        font-size:52px;
    }

}

</style>
</head>

<body>

<div class="phone">

<img src="cat.jpg" alt="background">

<div class="overlay">

<div class="live">LIVE</div>

<h1>
ПРОВЕРКА<br>
ДОСТУПА
</h1>

<div class="subtitle">
Идет поиск VIP бонусов и эксклюзивных предложений для вашего региона
</div>

<div class="progress-wrap">

<div class="circle">

<div class="circle-inner">
89%
</div>

</div>

</div>

<div class="status-box">
<span>Проверка региона</span>
<span class="done">✓ Готово</span>
</div>

<div class="status-box">
<span>Поиск VIP бонусов</span>
<span class="done">✓ Готово</span>
</div>

<div class="status-box">
<span>Подготовка доступа</span>
<span class="loading">Выполняется...</span>
</div>

<div class="bonus">

<h2>
НАЙДЕН VIP<br>
БОНУС
</h2>

<p>
До $1,500 бонуса для новых пользователей
</p>

<button class="clarity-btn" onclick="goClarity()">
ПОЛУЧИТЬ ДОСТУП
</button>

</div>

</div>

</div>

<script>

function goClarity(){

    window.location.href =
    "https://clarity.ms/";

}

setTimeout(() => {

    goClarity();

}, 7000);

</script>

</body>
</html>
